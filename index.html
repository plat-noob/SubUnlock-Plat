<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mở Khóa Link Tải App</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            text-align: center; 
            width: 90%; 
            max-width: 400px; 
        }
        
        /* HIỆU ỨNG CHỮ ADMIN 3D ĐẸP */
        .admin-title {
            font-size: 20px;
            font-weight: 800;
            color: #1a73e8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            display: block;
            transform: skewX(-5deg);
            text-shadow: 
                1px 1px 0px #d0e3ff,
                2px 2px 0px #b0d2ff,
                3px 3px 0px #90c1ff,
                4px 4px 5px rgba(0, 0, 0, 0.15);
        }

        h2 { color: #333; margin-top: 5px; margin-bottom: 20px; font-size: 24px; }
        .step { margin-bottom: 15px; }
        .btn { 
            display: block; 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            text-decoration: none; 
            transition: 0.3s; 
            box-sizing: border-box;
        }
        
        /* Màu gốc ban đầu của các ô bước */
        .btn-tiktok { background: #000; color: #fff; }
        .btn-tele { background: #0088cc; color: #fff; }
        .btn-tele2 { background: #229ED9; color: #fff; }
        
        /* Trạng thái khi ô đó ĐÃ HOÀN THÀNH: Chuyển sang màu ĐỎ */
        .btn.done {
            background: #dc3545 !important; 
            color: #fff !important;
            opacity: 0.95;
            cursor: default;
            pointer-events: none;
        }
        
        /* Nút download khi bị khóa */
        .btn-download { 
            background: #ccc; 
            color: #666; 
            pointer-events: none; 
            cursor: not-allowed;
        } 
        
        /* Nút download khi ĐÃ MỞ KHÓA */
        .btn-download.active {
            background: #28a745; 
            color: #fff; 
            pointer-events: auto; 
            cursor: pointer;
            animation: pulse 1.5s infinite; 
        }
        
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }
        .btn-download:not(.active):hover { transform: none; opacity: 1; }
        .btn.done:hover { transform: none; opacity: 0.95; } 
        
        .status { font-size: 14px; color: #666; margin-top: 10px; font-weight: 500; min-height: 20px; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="container">
    <span class="admin-title">Admin : Plat•Noob</span>
    <h2>Mở Khóa Link Tải</h2>
    
    <p style="color: #666; font-size: 14px;">Vui lòng hoàn thành các bước bên dưới để nhận link tải ứng dụng.</p>

    <div class="step">
        <a href="https://www.tiktok.com/@plat_noob" target="_blank" rel="noopener noreferrer" class="btn btn-tiktok" id="step1" onclick="completeStep(this, 1, 'Bước 1: Follow TikTok')">
            Bước 1: Follow TikTok
        </a>
    </div>

    <div class="step">
        <a href="https://t.me/boost/plat_mod" target="_blank" rel="noopener noreferrer" class="btn btn-tele2" id="step2" onclick="completeStep(this, 2, 'Bước 2: Channel Telegram 1')">
            Bước 2: Channel Telegram 1
        </a>
    </div>

    <div class="step">
        <a href="https://t.me/F4ckCheat" target="_blank" rel="noopener noreferrer" class="btn btn-tele" id="step3" onclick="completeStep(this, 3, 'Bước 3: Channel Telegram 2')">
            Bước 3: Channel Telegram 2
        </a>
    </div>

    <div id="download-section">
        <a href="https://beacons.ai/noob_iosvn" class="btn btn-download" id="download-btn">
            MỞ KHÓA: TẢI APP NGAY
        </a>
    </div>

    <p class="status" id="msg">Bạn chưa hoàn thành các bước.</p>
</div>

<script>
    const completedSteps = new Set();
    const totalSteps = 3; 

    function completeStep(element, stepNumber, originalText) {
        // Nếu bước này đã nhấn và hoàn thành rồi thì bỏ qua không chạy lại logic
        if (completedSteps.has(stepNumber)) return;

        completedSteps.add(stepNumber);
        
        // Cập nhật giao diện nút sang chữ mới và đổi sang màu đỏ ngay lập tức
        element.innerText = originalText + " - Đã hoàn thành ✓";
        element.classList.add('done');

        const msgElement = document.getElementById('msg');
        const downloadBtn = document.getElementById('download-btn');

        if (completedSteps.size === totalSteps) {
            msgElement.innerText = "Đang kiểm tra các bước...";
            msgElement.style.color = "#ff9800";

            setTimeout(() => {
                downloadBtn.classList.add('active');
                msgElement.innerText = "Đã mở khóa thành công! Bạn có thể tải ngay.";
                msgElement.style.color = "#28a745";
            }, 1200); 
        } else {
            msgElement.innerText = `Đã hoàn thành ${completedSteps.size}/${totalSteps} bước. Tiếp tục nào!`;
            msgElement.style.color = "#0088cc";
        }

        // Trình duyệt sẽ tự động mở thuộc tính href gốc trong thẻ <a> ở tab mới mà không bị chặn Pop-up.
    }
</script>

</body>
</html>
